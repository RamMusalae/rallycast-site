<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RallyCast | Weather Intelligence for Court Sports</title>
  <meta name="description" content="RallyCast analyzes wind, rain, temperature and humidity to determine if conditions are ideal for tennis or pickleball." />
  <style>
    :root {
      --bg: #0b3d2e;
      --text: #ffffff;
      --card-bg: #ffffff;
      --card-text: #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, system-ui, -apple-system, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 1.5rem;
      line-height: 1.5;
    }

    main {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
      margin-bottom: 0.7rem;
    }

    .brand-icon {
      width: clamp(52px, 9vw, 74px);
      height: clamp(52px, 9vw, 74px);
      border-radius: 14px;
      display: block;
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 4rem);
      letter-spacing: 0.03em;
      margin: 0;
    }

    .subtitle {
      font-size: clamp(1rem, 3vw, 1.4rem);
      margin-bottom: 1.2rem;
      opacity: 0.95;
    }

    .tagline {
      font-size: clamp(1.15rem, 3.4vw, 1.6rem);
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .card {
      background: var(--card-bg);
      color: var(--card-text);
      border-radius: 14px;
      padding: clamp(1.2rem, 3.8vw, 2rem);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.25);
    }

    .description {
      font-size: clamp(1rem, 2.6vw, 1.15rem);
      max-width: 56ch;
      margin: 0 auto 1.25rem;
    }

    .ratings {
      list-style: none;
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.35rem;
    }

    .ratings li {
      background: #f3f3f3;
      border-radius: 999px;
      padding: 0.35rem 0.85rem;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .coming-soon {
      font-weight: 800;
      font-size: clamp(1.1rem, 3.1vw, 1.5rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .feature {
      margin-top: 1.15rem;
      width: 100%;
      border-radius: 12px;
      display: block;
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <img class="brand-icon" src="assets/rallycast_app_icon.png" alt="RallyCast app icon" />
      <h1>RallyCast</h1>
    </div>
    <p class="subtitle">Weather Intelligence for Court Sports</p>
    <p class="tagline">Know before you play.</p>

    <section class="card" aria-label="Product overview">
      <p class="description">
        RallyCast analyzes wind, rain, temperature and humidity to determine if conditions are ideal for tennis or pickleball.
      </p>

      <ul class="ratings" aria-label="Playability rating options">
        <li>Excellent</li>
        <li>Good</li>
        <li>Maybe</li>
        <li>No</li>
      </ul>

      <p class="coming-soon">Coming Soon</p>

      <img
        class="feature"
        src="assets/rallycast_feature_graphic.png"
        alt="RallyCast feature graphic preview"
      />
    </section>
  </main>
</body>
</html>
